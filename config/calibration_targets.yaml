# -----------------------------------------------------------------------------
# config/calibration_targets.yaml
#
# Ground truth for the dual-track NMBE calibration in Module E.
# Do NOT modify these numbers to make the model pass — surface the gap instead.
#
# Track 1 (public buildings): the Wang et al. (2026) 144-point matrix —
#   12 archetypes x 12 months of monthly electricity EUI [kWh/m2 / month].
#   Target NMBE: |NMBE| <= 10 % per archetype, averaged across months.
#
# Track 2 (residential): annual EUI from Tsinghua Building Energy Annual
#   Reports and GB/T 51161-2016. Target NMBE: |NMBE| <= 20 % annual.
# -----------------------------------------------------------------------------

source:
  public: "Wang H. et al., Green Building, 2026(1). Shanghai building carbon emission smart monitoring platform."
  residential:
    - "Tsinghua Building Energy Annual Report, latest edition"
    - "GB/T 51161-2016"
    - "Shanghai Statistical Yearbook, latest edition"

# Target thresholds (do not relax)
targets:
  public:
    metric: "NMBE"
    granularity: "monthly"
    threshold_pct: 10
  residential:
    metric: "NMBE"
    granularity: "annual"
    threshold_pct: 20

# -----------------------------------------------------------------------------
# Track 1: Wang et al. 144-point matrix
# rows  = 12 public archetypes (names must match config/archetypes.yaml)
# cols  = months 1..12, values in kWh/m2 / month
# -----------------------------------------------------------------------------
